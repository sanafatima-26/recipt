<!DOCTYPE html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FE Receipt System - Student Fee Receipt Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .receipt-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin: 20px auto;
            padding: 30px;
            max-width: 900px;
        }
        .form-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #667eea;
        }
        .form-header h1 {
            color: #667eea;
            font-weight: bold;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .required-field::after {
            content: " *";
            color: red;
        }
        .nav-links {
            text-align: center;
            margin-bottom: 20px;
        }
        .nav-links a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="nav-links">
        <a href="/"><i class="fas fa-home"></i> Home</a>
        <a href="/all_receipts"><i class="fas fa-list"></i> All Receipts</a>
    </div>
    
    <div class="container">
        <div class="receipt-container">
            <div class="form-header">
                <h1><i class="fas fa-receipt"></i> FE Receipt System</h1>
                <p class="text-muted">Fill in the details to generate your fee receipt</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="{{ url_for('submit_receipt') }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">Student Name</label>
                        <input type="text" class="form-control" name="student_name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">Father's Name</label>
                        <input type="text" class="form-control" name="father_name" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">Mother's Name</label>
                        <input type="text" class="form-control" name="mother_name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">Course</label>
                        <select class="form-control" name="course" required>
                            <option value="">Select Course</option>
                            <option value="B.Tech Computer Science">B.Tech Computer Science</option>
                            <option value="B.Tech Mechanical Engineering">B.Tech Mechanical Engineering</option>
                            <option value="B.Tech Civil Engineering">B.Tech Civil Engineering</option>
                            <option value="B.Tech Electronics">B.Tech Electronics</option>
                            <option value="MCA">MCA</option>
                            <option value="MBA">MBA</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">Semester</label>
                        <select class="form-control" name="semester" required>
                            <option value="">Select Semester</option>
                            <option value="1st Semester">1st Semester</option>
                            <option value="2nd Semester">2nd Semester</option>
                            <option value="3rd Semester">3rd Semester</option>
                            <option value="4th Semester">4th Semester</option>
                            <option value="5th Semester">5th Semester</option>
                            <option value="6th Semester">6th Semester</option>
                            <option value="7th Semester">7th Semester</option>
                            <option value="8th Semester">8th Semester</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">Roll Number</label>
                        <input type="text" class="form-control" name="roll_number" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">Registration Number</label>
                        <input type="text" class="form-control" name="registration_number" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">Fee Amount (₹)</label>
                        <input type="number" class="form-control" name="fee_amount" step="0.01" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">Payment Date</label>
                        <input type="date" class="form-control" name="payment_date" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">Payment Mode</label>
                        <select class="form-control" name="payment_mode" required>
                            <option value="">Select Mode</option>
                            <option value="Cash">Cash</option>
                            <option value="Online Transfer">Online Transfer</option>
                            <option value="Credit Card">Credit Card</option>
                            <option value="Debit Card">Debit Card</option>
                            <option value="UPI">UPI</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Transaction ID (if online)</label>
                        <input type="text" class="form-control" name="transaction_id">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">Phone Number</label>
                        <input type="tel" class="form-control" name="phone" pattern="[0-9]{10}" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label required-field">Address</label>
                    <textarea class="form-control" name="address" rows="3" required></textarea>
                </div>
                
                <button type="submit" class="btn btn-submit text-white">
                    <i class="fas fa-download"></i> Generate Receipt
                </button>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
